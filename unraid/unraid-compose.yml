# LFFPicard - Sentinel
# Unraid Community Applications Compose Template
# Place this file at: /boot/config/plugins/compose.manager/projects/sentinel/docker-compose.yml

services:
  sentinel-postgres:
    image: postgres:17-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/sentinel/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: https://raw.githubusercontent.com/LFFPicard/sentinel/main/assets/sentinel-icon.png

  sentinel-collector:
    image: lffpicard/sentinel-collector:latest
    container_name: sentinel-collector
    restart: unless-stopped
    depends_on:
      sentinel-postgres:
        condition: service_healthy
    volumes:
      - /mnt/user/appdata/sentinel/import:/import
      - /mnt/user/appdata/sentinel/logs:/data/logs
    environment:
      DATABASE_URL: postgres://sentinel:${DB_PASSWORD}@sentinel-postgres:5432/sentinel
      PLEX_URL: ${PLEX_URL}
      PLEX_TOKEN: ${PLEX_TOKEN}
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: https://raw.githubusercontent.com/LFFPicard/sentinel/main/assets/sentinel-icon.png

  sentinel-api:
    image: lffpicard/sentinel-api:latest
    container_name: sentinel-api
    restart: unless-stopped
    depends_on:
      sentinel-postgres:
        condition: service_healthy
    ports:
      - "${SENTINEL_PORT:-7700}:7700"
    volumes:
      - /mnt/user/appdata/sentinel/logs:/data/logs
    environment:
      DATABASE_URL: postgres://sentinel:${DB_PASSWORD}@sentinel-postgres:5432/sentinel
      SENTINEL_PORT: ${SENTINEL_PORT:-7700}
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: https://raw.githubusercontent.com/LFFPicard/sentinel/main/assets/sentinel-icon.png
      net.unraid.docker.webui: http://[IP]:[PORT:7700]/admin
